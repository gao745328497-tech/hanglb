/div>\n          <\/div>\n          <div class=\"coupon-item\" onclick=\"selectCoupon(this)\">\n            <div class=\"coupon-tag\" style=\"background:linear-gradient(135deg,#FF9500,#ffb340)\"><div class=\"val\">50<\/div><div class=\"type\">元券<\/div><\/div>\n            <div class=\"coupon-info\">\n              <div class=\"coupon-name\">满500减50元 优惠券<\/div>\n              <div class=\"coupon-cond\">适用：全部机票，满¥500可用<\/div>\n              <div class=\"coupon-exp\">有效期：2026年3月31日<\/div>\n            <\/div>\n            <div class=\"coupon-radio\"><\/div>\n          <\/div>\n          <div style=\"padding:8px 16px;font-size:12px;color:#aaa;margin-top:4px;\">不可用优惠券 (1张)<\/div>\n          <div class=\"coupon-item\" style=\"opacity:0.5;\">\n            <div class=\"coupon-tag\" style=\"background:#ddd\"><div class=\"val\" style=\"color:#999;\">30<\/div><div class=\"type\" style=\"color:#bbb;\">元券<\/div><\/div>\n            <div class=\"coupon-info\">\n              <div class=\"coupon-name\" style=\"color:#aaa;\">会员专享30元券<\/div>\n              <div class=\"coupon-cond\">不满足使用条件（需飞享金会员）<\/div>\n              <div class=\"coupon-exp\">有效期：2026年6月30日<\/div>\n            <\/div>\n          <\/div>\n        <\/div>\n        <div style=\"padding:12px 16px;\">\n          <button onclick=\"closeCoupon()\" style=\"width:100%;height:46px;background:#00C48C;border:none;border-radius:8px;color:#fff;font-size:16px;font-weight:600;cursor:pointer;\">确定<\/button>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n\n  <!-- 支付弹窗 -->\n  <div class=\"modal-overlay\" id=\"pay-modal\">\n    <div class=\"pay-modal\">\n      <div class=\"pay-modal-icon\">⏳<\/div>\n      <div class=\"pay-modal-title\">支付中...<\/div>\n      <div class=\"pay-modal-sub\">正在跳转至支付页面，请稍候<\/div>\n      <div style=\"padding:0 20px 20px;\">\n        <button onclick=\"paySuccess()\" style=\"width:100%;height:46px;background:#00C48C;border:none;border-radius:8px;color:#fff;font-size:15px;cursor:pointer;\">模拟支付成功<\/button>\n      <\/div>\n    <\/div>\n  <\/div>\n\n  <!-- 支付成功弹窗 -->\n  <div class=\"modal-overlay\" id=\"success-modal\">\n    <div class=\"pay-modal\">\n      <div class=\"pay-modal-icon\">✅<\/div>\n      <div class=\"pay-modal-title\">支付成功！<\/div>\n      <div class=\"pay-modal-sub\">您的订单已确认，行程单将发送至邮箱<\/div>\n      <button class=\"pay-modal-btn\" onclick=\"parent.__navigate('index')\">返回首页<\/button>\n    <\/div>\n  <\/div>\n\n<\/div>\n\n<script>\n// 倒计时\nlet seconds = 14*60+59;\nconst timer = document.getElementById('timer');\nconst interval = setInterval(()=>{\n  seconds--;\n  if(seconds<=0){clearInterval(interval);timer.textContent='已超时';timer.style.color='#FF4D4F';return;}\n  const m=Math.floor(seconds/60).toString().padStart(2,'0');\n  const s=(seconds%60).toString().padStart(2,'0');\n  timer.textContent=`${m}:${s}`;\n},1000);\n\nfunction toggleService(el){\n  el.querySelector('.service-check').classList.toggle('checked');\n}\nfunction toggleInvoice(){\n  document.getElementById('invoice-check').classList.toggle('checked');\n  const d=document.getElementById('invoice-detail');\n  d.style.display=d.style.display==='none'?'block':'none';\n}\nfunction toggleAgree(){\n  document.getElementById('agree-check').classList.toggle('checked');\n}\nfunction selectPay(el){\n  document.querySelectorAll('.pay-radio').forEach(r=>r.classList.remove('active'));\n  el.querySelector('.pay-radio').classList.add('active');\n}\nfunction showCouponDrawer(){\n  document.getElementById('coupon-overlay').classList.add('show');\n  document.getElementById('coupon-overlay').style.display='flex';\n}\nfunction closeCoupon(){\n  document.getElementById('coupon-overlay').style.display='none';\n}\nfunction selectCoupon(el){\n  document.querySelectorAll('.coupon-radio').forEach(r=>r.classList.remove('selected'));\n  el.querySelector('.coupon-radio').classList.add('selected');\n}\nfunction showPayModal(){\n  document.getElementById('pay-modal').classList.add('show');\n  document.getElementById('pay-modal').style.display='flex';\n}\nfunction paySuccess(){\n  document.getElementById('pay-modal').style.display='none';\n  document.getElementById('success-modal').style.display='flex';\n}\n<\/script>\n<\/body>\n<\/html>\n"};
const PAGE_ORDER = ['index','search','list','cabin','payment'];
const historyStack = ['index'];
let currentPage = 'index';
function initFrames() {
  for (const page of PAGE_ORDER) document.getElementById('frame-' + page).srcdoc = PAGE_HTML[page];
  setTimeout(() => showPage('index'), 30);
}
function showPage(page) {
  currentPage = page;
  for (const p of PAGE_ORDER) {
    document.getElementById('frame-' + p).classList.toggle('active', p === page);
    const pill = document.querySelector('.pill[data-page="' + p + '"]');
    if (pill) pill.classList.toggle('active', p === page);
  }
}
window.__navigate = function(page) {
  if (!PAGE_ORDER.includes(page)) return;
  if (historyStack[historyStack.length - 1] !== page) historyStack.push(page);
  showPage(page);
};
window.__back = function() {
  if (historyStack.length > 1) { historyStack.pop(); showPage(historyStack[historyStack.length - 1]); }
  else showPage('index');
};
window.addEventListener('keydown', (e) => {
  const tag = document.activeElement && document.activeElement.tagName ? document.activeElement.tagName.toLowerCase() : '';
  if (((e.altKey && e.key === 'ArrowLeft') || e.key === 'Backspace') && tag !== 'input' && tag !== 'textarea') __back();
});
initFrames();
